<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0d1117"/>
      <stop offset="100%" stop-color="#11161d"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#38bdf8"/>
      <stop offset="100%" stop-color="#818cf8"/>
    </linearGradient>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M40 0H0V40" fill="none" stroke="#1c2128" stroke-width="0.6"/>
    </pattern>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#grid)" opacity="0.7"/>

  <rect x="80" y="80" width="4" height="470" rx="2" fill="url(#accent)"/>

  <g transform="translate(110, 80)">
    <rect width="56" height="56" rx="14" fill="#0d1117" stroke="#30363d" stroke-width="1.5"/>
    <text x="28" y="40" text-anchor="middle" font-family="Inter, -apple-system, sans-serif" font-weight="800" font-size="32" fill="url(#accent)">M</text>
  </g>

  <text x="110" y="350" font-family="Inter, -apple-system, sans-serif" font-weight="800" font-size="84" fill="#e6edf3" letter-spacing="-3">Mickael Soussan</text>

  <text x="110" y="405" font-family="JetBrains Mono, ui-monospace, monospace" font-weight="600" font-size="22" fill="#38bdf8" letter-spacing="2.5">PRINCIPAL AI &amp; CYBERSECURITY ARCHITECT</text>

  <text x="110" y="470" font-family="Inter, -apple-system, sans-serif" font-weight="500" font-size="30" fill="#a3aebd">I design AI systems for threat intelligence.</text>

  <text x="1120" y="580" text-anchor="end" font-family="JetBrains Mono, ui-monospace, monospace" font-weight="500" font-size="18" fill="#8794a4" letter-spacing="1">mickaelsoussan.com</text>
</svg>
